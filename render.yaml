services:
  - type: web
    name: choirx-memoryfix-backend
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: MAX_UPLOAD_MB
        value: 8
      - key: MAX_AUDIO_SECONDS
        value: 75
      - key: CORS_ORIGINS
        value: '*'
      - key: OUTPUT_FORMAT
        value: wav
